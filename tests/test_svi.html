<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SVI — tests</title>
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 font-sans">
  <main class="max-w-5xl mx-auto p-6 space-y-4">
    <header>
      <h1 class="text-2xl font-bold">SVI — browser tests</h1>
      <p class="text-zinc-400 text-sm">
        Synthetic-smile param recovery for <code class="font-mono text-teal-400">js/svi.js</code>.
        Generates a known SVI surface, samples it at market-like log-moneyness points,
        adds optional noise, and checks that the fit recovers the parameters within tolerance.
      </p>
    </header>

    <section id="summary" class="font-mono text-sm"></section>

    <table class="w-full text-sm font-mono">
      <thead class="text-zinc-400 border-b border-zinc-800">
        <tr>
          <th class="text-left py-2">Case</th>
          <th class="text-left">Quantity</th>
          <th class="text-right">Got</th>
          <th class="text-right">Expected</th>
          <th class="text-right">Δ (abs)</th>
          <th class="text-right">Tol</th>
          <th class="text-center">PASS</th>
        </tr>
      </thead>
      <tbody id="results"></tbody>
    </table>
  </main>

  <script type="module">
    import { svi, sviIv, fitSvi, nelderMead } from "../js/svi.js";

    const results = document.getElementById("results");
    const summary = document.getElementById("summary");
    let passed = 0, failed = 0;

    function check(caseName, qty, got, expected, tol) {
      const d = Math.abs(got - expected);
      const ok = d <= tol;
      ok ? passed++ : failed++;
      const row = document.createElement("tr");
      row.className = "border-b border-zinc-900";
      row.innerHTML = `
        <td class="py-1.5 text-zinc-300">${caseName}</td>
        <td class="text-zinc-300">${qty}</td>
        <td class="text-right">${typeof got === "number" ? got.toExponential(4) : got}</td>
        <td class="text-right">${typeof expected === "number" ? expected.toExponential(4) : expected}</td>
        <td class="text-right ${ok ? "text-zinc-500" : "text-rose-400"}">${d.toExponential(2)}</td>
        <td class="text-right text-zinc-500">${tol.toExponential(0)}</td>
        <td class="text-center ${ok ? "text-teal-400" : "text-rose-500 font-bold"}">${ok ? "PASS" : "FAIL"}</td>
      `;
      results.appendChild(row);
    }

    // ─── svi(k, p) point evaluations ────────────────────────────────────────
    {
      // p = {a: 0.04, b: 0.4, rho: -0.5, m: 0, sigma: 0.1}
      // w(0) = 0.04 + 0.4*(−0.5*0 + √(0 + 0.01)) = 0.04 + 0.4*0.1 = 0.08
      const p = { a: 0.04, b: 0.4, rho: -0.5, m: 0, sigma: 0.1 };
      check("svi(k,p)", "w(0)", svi(0, p), 0.08, 1e-12);
      // w(0.5) = 0.04 + 0.4*(-0.5*0.5 + √(0.25 + 0.01)) = 0.04 + 0.4*(-0.25 + 0.50990195)
      //        = 0.04 + 0.4*0.25990195 = 0.04 + 0.10396078 = 0.14396078
      check("svi(k,p)", "w(0.5)", svi(0.5, p), 0.14396078, 1e-7);
      // w(-0.5) = 0.04 + 0.4*(-0.5*(-0.5) + √(0.25 + 0.01)) = 0.04 + 0.4*(0.25 + 0.50990195)
      //        = 0.04 + 0.4*0.75990195 = 0.04 + 0.30396078 = 0.34396078
      check("svi(k,p)", "w(-0.5)", svi(-0.5, p), 0.34396078, 1e-7);
    }

    // ─── sviIv: w → IV via √(w/T) ───────────────────────────────────────────
    {
      const p = { a: 0.04, b: 0.4, rho: -0.5, m: 0, sigma: 0.1 };
      // w(0)=0.08, T=1 → IV = √0.08 = 0.28284271
      check("sviIv", "T=1, k=0", sviIv(0, p, 1), 0.28284271, 1e-7);
      // T=0.25 → IV = √(0.08/0.25) = √0.32 = 0.56568542
      check("sviIv", "T=0.25, k=0", sviIv(0, p, 0.25), 0.56568542, 1e-7);
    }

    // ─── Nelder-Mead recovers a quadratic minimum ───────────────────────────
    {
      // f(x,y) = (x-3)² + (y+1)² + 7, min at (3,-1) with value 7
      const r = nelderMead([0, 0], (x) => (x[0]-3)**2 + (x[1]+1)**2 + 7);
      check("NM", "argmin x", r.x[0], 3, 1e-4);
      check("NM", "argmin y", r.x[1], -1, 1e-4);
      check("NM", "min value", r.fx, 7, 1e-6);
      check("NM", "converged", r.converged ? 1 : 0, 1, 0);
    }

    // ─── Nelder-Mead on Rosenbrock — classic stress test ───────────────────
    {
      // f(x,y) = (1-x)² + 100(y-x²)²; min at (1,1)
      const f = (x) => (1 - x[0]) ** 2 + 100 * (x[1] - x[0] * x[0]) ** 2;
      const r = nelderMead([-1.2, 1.0], f, { maxIter: 5000, tol: 1e-12 });
      check("NM Rosenbrock", "x→1", r.x[0], 1, 1e-3);
      check("NM Rosenbrock", "y→1", r.x[1], 1, 1e-3);
    }

    // ─── fitSvi recovers a noiseless smile ──────────────────────────────────
    {
      const trueP = { a: 0.04, b: 0.4, rho: -0.4, m: 0.05, sigma: 0.12 };
      const ks = [-0.5, -0.3, -0.15, -0.05, 0, 0.05, 0.15, 0.3, 0.5];
      const pts = ks.map((k) => ({ k, w: svi(k, trueP) }));
      const fit = fitSvi(pts, { maxIter: 5000, tol: 1e-14 });
      // Tolerance: 1e-3 on params is plenty given 5-param fit has scale degeneracy
      check("fitSvi noiseless", "a recovery",     fit.params.a,    trueP.a,    1e-3);
      check("fitSvi noiseless", "b recovery",     fit.params.b,    trueP.b,    1e-3);
      check("fitSvi noiseless", "rho recovery",   fit.params.rho,  trueP.rho,  1e-3);
      check("fitSvi noiseless", "m recovery",     fit.params.m,    trueP.m,    1e-3);
      check("fitSvi noiseless", "sigma recovery", fit.params.sigma, trueP.sigma, 1e-3);
      check("fitSvi noiseless", "rmse < 1e-6",    fit.rmse,        0,          1e-6);
    }

    // ─── fitSvi tolerates moderate noise ────────────────────────────────────
    {
      // Reproducible noise
      let seedRand = 12345;
      function rand() { seedRand = (seedRand * 9301 + 49297) % 233280; return seedRand / 233280; }
      const trueP = { a: 0.05, b: 0.3, rho: -0.5, m: 0, sigma: 0.15 };
      const ks = [-0.6, -0.4, -0.25, -0.1, -0.025, 0.025, 0.1, 0.25, 0.4, 0.6];
      const pts = ks.map((k) => ({ k, w: svi(k, trueP) + (rand() - 0.5) * 1e-4 }));
      const fit = fitSvi(pts, { maxIter: 5000, tol: 1e-14 });
      // With 1e-4 noise on w, rmse should be ~6e-5 on average (matches noise SD/√n is too tight)
      check("fitSvi noisy", "rmse < 5e-4", fit.rmse, 0, 5e-4);
      // Recover m within ~0.1 (m is the most sensitive to noise)
      check("fitSvi noisy", "m within 0.1 of true",   Math.abs(fit.params.m - trueP.m), 0, 0.1);
    }

    // ─── No-arb penalty: fit refuses to drive sigma negative ───────────────
    {
      // Cook a target where unconstrained fit might want sigma<0
      const trueP = { a: 0.02, b: 0.3, rho: -0.6, m: 0, sigma: 0.05 };
      const ks = [-0.4, -0.2, -0.1, 0, 0.1, 0.2, 0.4];
      const pts = ks.map((k) => ({ k, w: svi(k, trueP) }));
      const fit = fitSvi(pts);
      check("no-arb", "sigma > 0", fit.params.sigma > 0 ? 1 : 0, 1, 0);
      check("no-arb", "b ≥ 0",     fit.params.b >= -1e-6 ? 1 : 0, 1, 0);
      check("no-arb", "|rho| < 1", Math.abs(fit.params.rho) < 1 ? 1 : 0, 1, 0);
    }

    // ─── Underdetermined: <5 points returns NaN params ─────────────────────
    {
      const fit = fitSvi([{k:0, w:0.05}, {k:0.1, w:0.06}]);
      check("guard", "<5 pts → NaN a", Number.isNaN(fit.params.a) ? 1 : 0, 1, 0);
      check("guard", "<5 pts → not converged", fit.converged ? 0 : 1, 1, 0);
    }

    summary.innerHTML = `
      <span class="${failed === 0 ? "text-teal-400" : "text-rose-500"} text-base font-bold">
        ${failed === 0 ? "ALL " : ""}${passed} passed${failed ? `, ${failed} FAILED` : ""}
      </span>
      <span class="text-zinc-500"> (${passed + failed} total)</span>
    `;
  </script>
</body>
</html>
